{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block main %}
<div class="chat-window">
    <div class="messages-screen">
        <div class="messages" id="messages">
            {% for message in messages %}
            <p class="message {{message.role}}-message">{{ message.content }}</p>
            {% endfor %}
        </div>
    </div>
</div>
<form action="{{ url_for('chat_post', convo_id=convo_id) }}" id="form" method="POST">
    <div name="user_message" contenteditable="true" placeholder="What are you looking for?"></div>
    <button type="submit" id="submit-button"> {% include "send.svg" %} </button>
</form>
<script src="{{ url_for('static', filename='ask_message.js') }}"></script>
{% endblock %}
